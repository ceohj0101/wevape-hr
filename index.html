<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE VAPE — 신입 면접 관리</title>
<style>
  :root{--bg:#f4f6fb;--bg2:#eaecf4;--bg3:#dde1ee;--border:rgba(15,23,66,.1);--text:#0f172a;--muted:#5a6480;--accent:#f5c518;--accent2:#e6b400;--nav:#0d1424}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .hero{background:linear-gradient(150deg,#0a0f1e 0%,#0d1424 45%,#111a30 100%);border-bottom:3px solid var(--accent);padding:24px 24px 20px;position:relative;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.3)}
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 15% 60%,rgba(245,197,24,.18) 0%,transparent 55%),radial-gradient(ellipse at 85% 10%,rgba(245,197,24,.1) 0%,transparent 45%),radial-gradient(ellipse at 50% 100%,rgba(245,197,24,.06) 0%,transparent 50%);pointer-events:none}
  .hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;position:relative}
  .hero-logo{height:38px;object-fit:contain;display:none}
  .hero-logo-text{font-size:32px;font-weight:900;letter-spacing:.1em;color:#fff;display:block;text-shadow:0 0 20px rgba(245,197,24,.4)}.hero-logo-text span{color:var(--accent)}
  .hero-region{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
  .hero-title{font-size:20px;font-weight:900;color:#e8eaf2;letter-spacing:-.5px}
  .hero-sub{font-size:12px;color:rgba(255,255,255,.4);margin-top:5px}
  .header-right{display:flex;align-items:center;gap:10px;position:relative}
  .update-time{font-size:11px;color:rgba(255,255,255,.4)}
  .reload-btn{background:rgba(245,197,24,.12);border:1px solid rgba(245,197,24,.3);color:#f5c518;border-radius:8px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
  .reload-btn:hover{background:rgba(245,197,24,.22)}.reload-btn:disabled{opacity:.4;cursor:not-allowed}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;padding:18px 24px 0}
  .stat-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:0 2px 8px rgba(15,23,66,.06)}
  .stat-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
  .stat-num{font-size:28px;font-weight:900;line-height:1;color:var(--text)}
  .stat-sub{font-size:9px;color:var(--muted);margin-top:3px}
  .stat-card.accent{border-color:rgba(245,197,24,.4);background:rgba(245,197,24,.07)}.stat-card.accent .stat-num{color:#c89a00}
  .stat-card.green{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.05)}.stat-card.green .stat-num{color:#16a34a}
  .stat-card.red{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.05)}.stat-card.red .stat-num{color:#dc2626}
  .stat-card.purple{border-color:rgba(168,85,247,.25);background:rgba(168,85,247,.05)}.stat-card.purple .stat-num{color:#9333ea}
  .monthly-wrap{padding:18px 24px 0}
  .monthly-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
  .monthly-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
  .period-picker{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
  .period-picker input[type=month]{background:#fff;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 8px;font-size:11px;outline:none;cursor:pointer}
  .period-picker input[type=month]:focus{border-color:var(--accent)}
  .monthly-table{overflow-x:auto;scrollbar-width:none}.monthly-table::-webkit-scrollbar{display:none}
  .monthly-tbl{width:100%;border-collapse:collapse;font-size:11px}
  .monthly-tbl th{color:var(--muted);font-weight:700;text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
  .monthly-tbl td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,.04);color:var(--text)}
  .monthly-tbl tr:last-child td{border-bottom:none}
  .monthly-tbl tr:hover td{background:rgba(245,197,24,.05)}
  .m-ym{font-weight:700;color:#c89a00}
  .m-val{font-size:13px;font-weight:800}
  .m-mini{height:4px;border-radius:2px;display:inline-block;margin-left:5px;vertical-align:middle;min-width:2px;max-width:60px}
  .m-empty{color:var(--muted)}
  .pipeline-wrap{padding:18px 24px 0}
  .pipeline-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
  .pipeline{display:flex;align-items:center;gap:0;overflow-x:auto;scrollbar-width:none}.pipeline::-webkit-scrollbar{display:none}
  .pipe{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:8px 13px;cursor:pointer;flex-shrink:0;transition:all .15s;min-width:72px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .pipe:hover{border-color:rgba(245,197,24,.5);box-shadow:0 2px 8px rgba(245,197,24,.15)}.pipe.active{border-color:var(--accent);background:rgba(245,197,24,.1);box-shadow:0 2px 10px rgba(245,197,24,.2)}
  .pipe-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .pipe-name{font-size:10px;font-weight:700;color:var(--muted)}.pipe-cnt{font-size:16px;font-weight:900;color:var(--text);line-height:1.1}
  .pipe-arrow{color:var(--muted);font-size:11px;margin:0 3px;flex-shrink:0}
  .content{padding:16px 24px}
  .filter-row{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap}.filter-row::-webkit-scrollbar{display:none}
  .chip{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);transition:all .15s;background:#fff;color:var(--muted);box-shadow:0 1px 3px rgba(15,23,66,.06)}
  .chip:hover{color:var(--text);border-color:rgba(245,197,24,.5)}.chip.active{color:#7a5f00;border-color:var(--accent);background:rgba(245,197,24,.13);box-shadow:0 1px 6px rgba(245,197,24,.2)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .card{background:#fff;border:1px solid var(--border);border-radius:16px;cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s;overflow:hidden;border-left:4px solid var(--sc);box-shadow:0 2px 8px rgba(15,23,66,.07)}
  .card:hover{border-color:rgba(245,197,24,.45);transform:translateY(-2px);box-shadow:0 6px 20px rgba(15,23,66,.12)}.card.open{border-color:rgba(245,197,24,.6);box-shadow:0 6px 20px rgba(245,197,24,.12)}
  .card-inner{padding:14px}
  .card-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;flex-shrink:0}
  .card-name{font-size:14px;font-weight:800;color:var(--text)}.card-sub{font-size:10px;color:var(--muted);margin-top:2px}
  .badge{margin-left:auto;display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:800;white-space:nowrap;flex-shrink:0}
  .badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
  .action-btns{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
  .act-btn{padding:5px 10px;border-radius:7px;border:1px solid;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.02em}
  .act-btn:hover{opacity:.85;transform:translateY(-1px)}.act-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .act-btn.green{border-color:rgba(22,163,74,.3);background:rgba(22,163,74,.08);color:#16a34a}
  .act-btn.red{border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.08);color:#dc2626}
  .act-btn.blue{border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.08);color:#2563eb}
  .act-btn.yellow{border-color:rgba(245,197,24,.4);background:rgba(245,197,24,.1);color:#a07800}
  .act-btn.gray{border-color:rgba(100,116,139,.3);background:rgba(100,116,139,.08);color:#64748b}
  .act-btn.purple{border-color:rgba(147,51,234,.3);background:rgba(147,51,234,.08);color:#9333ea}
  .info-list{display:flex;flex-direction:column;gap:4px}
  .info-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
  .info-icon{width:14px;text-align:center;flex-shrink:0;font-size:11px}
  .card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
  .stars{display:flex;align-items:center;gap:1px}.star{font-size:12px;color:#f5c518}.star.off{color:#dde1ec}
  .score-tag{font-size:10px;color:var(--muted);margin-left:4px}
  .chevron{font-size:10px;color:var(--muted);transition:transform .2s}.card.open .chevron{transform:rotate(180deg)}
  .detail{display:none;padding:12px 14px 14px;background:var(--bg2);border-top:1px solid var(--border)}
  .card.open .detail{display:block}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .df label{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:3px}
  .df p{font-size:11px;color:#4a5568;line-height:1.5;white-space:pre-wrap;word-break:break-word}.df p.nil{color:#cbd5e0}
  .df.wide{grid-column:span 2}
  .notion-btn{display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:5px 11px;background:rgba(245,197,24,.1);border-radius:7px;border:1px solid rgba(245,197,24,.35);font-size:11px;color:#a07800;font-weight:700;text-decoration:none}
  .notion-btn:hover{background:rgba(245,197,24,.2)}
  .divider{height:1px;background:var(--border);margin:20px 24px 0}
  .section-wrap{padding:18px 24px 0}
  .section-hd{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
  .section-title{font-size:13px;font-weight:800}
  .section-cnt{font-size:11px;color:var(--muted);background:var(--bg3);padding:2px 8px;border-radius:20px;border:1px solid var(--border);margin-left:4px}
  .section-live{font-size:10px;color:var(--muted);margin-left:auto;display:flex;align-items:center;gap:4px}
  .live-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
  .emp-card{background:#fff;border:1px solid rgba(34,197,94,.2);border-radius:14px;padding:13px 15px;cursor:pointer;transition:all .15s;border-left:3px solid #22c55e;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .emp-card:hover{border-color:rgba(34,197,94,.45);box-shadow:0 3px 10px rgba(0,0,0,.07)}.emp-card.open{border-color:rgba(34,197,94,.45)}
  .emp-card-head{display:flex;align-items:center;gap:10px}
  .emp-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;flex-shrink:0;background:#22c55e}
  .emp-info{flex:1;min-width:0}
  .emp-name{font-size:14px;font-weight:800;color:var(--text)}
  .emp-age{font-size:10px;color:var(--muted);margin-top:1px}
  .emp-tenure-badge{margin-left:auto;font-size:10px;font-weight:700;color:#16a34a;background:rgba(34,197,94,.1);padding:3px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
  .emp-hire{font-size:10px;color:rgba(22,163,74,.7);margin-top:7px}
  .emp-detail{display:none;padding-top:10px;border-top:1px solid rgba(34,197,94,.15);margin-top:10px;font-size:11px;color:#4a5568;line-height:1.6}
  .emp-card.open .emp-detail{display:block}
  .exit-card{background:#fff;border:1px solid rgba(100,116,139,.18);border-radius:14px;padding:13px 15px;cursor:pointer;transition:all .15s;border-left:3px solid #94a3b8;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .exit-card:hover{border-color:rgba(100,116,139,.35)}.exit-card.open{border-color:rgba(100,116,139,.35)}
  .exit-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;flex-shrink:0;background:#94a3b8}
  .exit-tenure-badge{margin-left:auto;font-size:10px;font-weight:700;color:#64748b;background:rgba(100,116,139,.1);padding:3px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
  .exit-date{font-size:10px;color:rgba(100,116,139,.8);margin-top:7px}
  .loading{text-align:center;padding:60px}.spinner{display:inline-block;width:26px;height:26px;border:3px solid rgba(245,197,24,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading p{margin-top:12px;font-size:12px;color:var(--muted)}
  .empty{text-align:center;padding:48px;color:var(--muted);font-size:12px}
  .empty-icon{font-size:32px;margin-bottom:10px}
  .error-box{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.2);border-radius:10px;padding:12px 15px;color:#dc2626;font-size:12px;line-height:1.6;margin-bottom:14px}
  .footer{text-align:center;padding:22px;font-size:10px;color:rgba(255,255,255,.3);border-top:2px solid rgba(245,197,24,.25);margin-top:22px;background:linear-gradient(135deg,#0a0f1e 0%,#0d1424 100%)}
  .toast{position:fixed;bottom:24px;right:24px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:12px;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:999;animation:slideup .2s ease;display:none}
  .toast.show{display:block}.toast.ok{border-color:rgba(34,197,94,.4);color:#16a34a}.toast.err{border-color:rgba(220,38,38,.35);color:#dc2626}
  @keyframes slideup{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
  .time-row{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);margin-top:6px;flex-wrap:wrap}
  .time-input{background:#fff;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer;outline:none}
  .time-input[type=date]{width:122px}.time-input[type=time]{width:88px}
  .time-input:focus{border-color:var(--accent)}
  .time-save-btn{background:rgba(245,197,24,.12);border:1px solid rgba(245,197,24,.4);color:#a07800;border-radius:5px;padding:3px 9px;font-size:10px;font-weight:700;cursor:pointer}
  .time-save-btn:hover{background:rgba(245,197,24,.22)}
  .resign-btn{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.25);color:#dc2626;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;margin-top:8px;width:100%}
  .resign-btn:hover{background:rgba(220,38,38,.12)}

  /* ===== 지원자 추가 모달 ===== */
  .add-btn{background:var(--accent);border:none;color:#1a1000;border-radius:9px;padding:7px 16px;font-size:12px;font-weight:800;cursor:pointer;letter-spacing:.3px;transition:background .15s,transform .1s;flex-shrink:0}
  .add-btn:hover{background:var(--accent2);transform:translateY(-1px)}
  .modal-overlay{position:fixed;inset:0;background:rgba(10,15,30,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
  .modal-box{background:#fff;border-radius:18px;padding:24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(10,15,30,.3);animation:modalIn .2s ease}
  @keyframes modalIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .modal-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:18px;display:flex;align-items:center;gap:8px}
  .modal-fields{display:flex;flex-direction:column;gap:12px}
  .mf-row{display:flex;gap:10px}
  .mf{display:flex;flex-direction:column;gap:5px;flex:1}
  .mf label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .mf input,.mf select{border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:13px;color:var(--text);outline:none;transition:border-color .15s;background:#fafbff}
  .mf input:focus,.mf select:focus{border-color:var(--accent);background:#fff}
  .modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
  .modal-cancel{background:var(--bg3);border:none;border-radius:9px;padding:9px 18px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer}
  .modal-cancel:hover{background:var(--bg2)}
  .modal-submit{background:var(--accent);border:none;border-radius:9px;padding:9px 20px;font-size:13px;font-weight:800;color:#1a1000;cursor:pointer;transition:background .15s}
  .modal-submit:hover{background:var(--accent2)}
  .modal-submit:disabled{opacity:.5;cursor:default}
  .mf-img-zone{border:2px dashed var(--border);border-radius:12px;padding:14px;text-align:center;cursor:pointer;transition:border-color .15s;background:#fafbff;position:relative;min-height:70px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
  .mf-img-zone:hover{border-color:var(--accent)}
  .mf-img-zone.has-img{border-style:solid;border-color:rgba(245,197,24,.5);padding:8px}
  .img-thumb{max-width:100%;max-height:130px;border-radius:8px;object-fit:contain}
  .img-clear-btn{position:absolute;top:6px;right:8px;background:rgba(10,15,30,.55);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center}
  .img-analyze-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);padding:6px 10px;background:rgba(245,197,24,.08);border-radius:8px;margin-top:8px}
  .img-analyze-bar .spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}


  /* ===== 카드 날짜 배너 + 평가란 ===== */
  .card-date-banner{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(245,197,24,.07);border-radius:10px;margin:0 14px 10px;border:1px solid rgba(245,197,24,.18)}
  .card-date-main{font-size:18px;font-weight:900;color:var(--text);letter-spacing:-.5px}
  .card-dday{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;background:rgba(91,127,245,.12);color:#5b7ff5;white-space:nowrap}
  .card-dday.today{background:var(--accent);color:#1a1000}
  .card-dday.past{background:rgba(100,116,139,.1);color:var(--muted)}
  .card-eval-wrap{padding:0 14px;margin-bottom:10px}
  .card-eval-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .card-eval-area{width:100%;min-height:82px;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--text);resize:vertical;background:#fafbff;font-family:inherit;transition:border-color .15s,box-shadow .15s;box-sizing:border-box;line-height:1.6;display:block}
  .card-eval-area:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(245,197,24,.1)}
  .card-eval-area::placeholder{color:var(--muted);font-size:12px}
  .card-eval-area.saving{border-color:var(--accent)}
  .card-eval-area.saved{border-color:#4ade80}

  /* ===== 이력서 라이트박스 ===== */
  .resume-btn{background:rgba(245,197,24,.12);border:1px solid rgba(245,197,24,.4);color:#7a5f00;border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .15s}
  .resume-btn:hover{background:rgba(245,197,24,.25)}
  #resumeLightbox{position:fixed;inset:0;background:rgba(10,15,30,.85);z-index:2000;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;backdrop-filter:blur(6px)}
  .lb-inner{position:relative;max-width:520px;width:100%}

const STACE_ACTIONS={

  '서류합격/연락중':[{label:'📅 면접 확정',next:'면접예정',cls:'purple'},{label:'💬 문자남겨놓음',next:'문자남겨놓음',cls:'yellow'},{label:'📵 콜백없음',next:'콜백없음',cls:'gray'}],
  '면접대기':[{label:'✅ 면접완료',next:'면접완료',cls:'green'},{label:'❌ 불참',next:'불참',cls:'red'}],
  '면접예정':[{label:'✅ 면접완료',next:'면접완료',cls:'green'},{label:'❌ 불참',next:'불참',cls:'red'}],
  '면접완료':[{label:'🎉 합격',next:'최종합격',cls:'green'},{label:'✗ 불합격',next:'불합격',cls:'red'}],
  '불합격':[{label:'↩️ 재검토',next:'면접완료',cls:'blue'}],
  '불참':[{label:'📅 재일정',next:'면접예정',cls:'purple'}],
  '문자남겨놓음':[{label:'📞 다시연락',next:'서류합격/연락중',cls:'blue'},{label:'📵 콜백없음',next:'콜백없음',cls:'gray'}],
  '콜백없음':[{label:'📞 다시연락',next:'서류합격/연락중',cls:'blue'}],
};
const STAGE_ACTIONS={
  '서류접수':[{label:'📞 연락완료',next:'서류합격/연락중',cls:'blue'},{label:'💬 문자남겨놓음',next:'문자남겨놓음',cls:'yellow'},{label:'📵 콜백없음',next:'콜백없음',cls:'gray'}],
  '서류합격/연락중':[{label:'📅 면접 확정',next:'면접예정',cls:'purple'},{label:'💬 문자남겨놓음',next:'문자남겨놓음',cls:'yellow'},{label:'📵 콜백없음',next:'콜백없음',cls:'gray'}],
  '면접대기':[{label:'✅ 면접완료',next:'면접완료',cls:'green'},{label:'❌ 불참',next:'불참',cls:'red'}],
  '면접예정':[{label:'✅ 면접완료',next:'면접완료',cls:'green'},{label:'❌ 불참',next:'불참',cls:'red'}],
  '면접완료':[{label:'🎉 합격',next:'최종합격',cls:'green'},{label:'✗ 불합격',next:'불합격',cls:'red'}],
  '문자남겨놓음':[{label:'📞 다시연락',next:'서류합격/연락중',cls:'blue'},{label:'📵 콜백없음',next:'콜백없음',cls:'gray'}],
  '콜백없음':[{label:'📞 다시연락',next:'서류합격/연락중',cls:'blue'}],
};
const AV=['#6366f1','#8b5cf6','#ec4899','#0ea5e9','#f97316','#a855f7','#14b8a6','#f59e0b','#3b82f6'];
let rows=[],flt='면접예정',openIdx=null,empOpenIdx=null,exitOpenIdx=null;

function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+type;
  clearTimeout(t._tm);t._tm=setTimeout(()=>t.className='toast',2500);
}

async function updateStatus(pageId,status,btnEl){
  if(!pageId){toast('ID 없음','err');return;}
  if(btnEl){btnEl.disabled=true;btnEl.textContent='⏳';}
  try{
    const r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pageId,status})});
    const d=await r.json();
    if(!r.ok||d.error) throw new Error(d.error||'Error');
    toast('✓ '+status+' 처리 완료');
    openIdx=null;
    await loadData();
  }catch(e){
    toast('오류: '+e.message,'err');
    if(btnEl){btnEl.disabled=false;btnEl.textContent='재시도';}
  }
}

const CACHE_KEY='wevape_data_v1';
const CACHE_TTL=5*60*1000;

function applyData(d){
  rows=d.records||d.results||[];
  if(d.updatedAt||d.updated){
    const t=new Date(d.updatedAt||d.updated).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    document.getElementById('lastUpdate').textContent=t+' 업데이트';
  }
  document.getElementById('loadingEl').style.display='none';
  document.getElementById('mainContent').style.display='block';
  renderAll();
}

async function loadData(forceRefresh=false){
  const btn=document.getElementById('reloadBtn');
  btn.disabled=true;btn.textContent='...';
  if(!forceRefresh){
    try{
      const c=localStorage.getItem(CACHE_KEY);
      if(c){
        const {data,ts}=JSON.parse(c);
        if(Date.now()-ts<CACHE_TTL){
          applyData(data);
          fetchFresh(btn,true);
          return;
        }
      }
    }catch(e){}
  }
  document.getElementById('loadingEl').style.display='block';
  document.getElementById('mainContent').style.display='none';
  fetchFresh(btn,false);
}

async function fetchFresh(btn,background){
  try{
    const controller=new AbortController();
    const tid=setTimeout(()=>controller.abort(),10000);
    const r=await fetch(WORKER,{signal:controller.signal});
    clearTimeout(tid);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    localStorage.setItem(CACHE_KEY,JSON.stringify({data:d,ts:Date.now()}));
    applyData(d);
    if(background) toast('✓ 최신 데이터 반영됨');
  }catch(e){
    if(!background){
      try{
        const c=localStorage.getItem(CACHE_KEY);
        if(c){ const {data}=JSON.parse(c); applyData(data); toast('⚠️ 오프라인 — 캐시 표시 중','err'); }
        else{
          rows=[];
          const eb=document.getElementById('errorBox');
          eb.className='error-box';eb.textContent='⚠️ 로드 실패: '+e.message;eb.style.display='block';
          document.getElementById('loadingEl').style.display='none';
          document.getElementById('mainContent').style.display='block';
        }
      }catch(e2){}
    }
  }
  btn.disabled=false;btn.textContent='↻ 새로고침';
}

function renderAll(){renderStats();renderPipeline();renderFilters();renderCards();renderEmployees();renderFormerEmployees();renderMonthly();}
const cnt=s=>rows.filter(r=>r['진행상태']===s).length;

function renderStats(){
  const thisMonth=new Date().toISOString().substring(0,7);
  const thisMonthPending=rows.filter(r=>{
    const ym=(r.createdAt||'').substring(0,7);
    const s=r['진행상태'];
    return ym===thisMonth&&s!=='최종합격'&&s!=='퇴사';
  }).length;
  const inP=PIPELINE.reduce((a,s)=>a+cnt(s),0);
  const emps=cnt('최종합격'),exits=cnt('퇴사');
  const neg=['불합격','불참','문자남겨놓음','콜백없음'].reduce((a,s)=>a+cnt(s),0);
  let h=`<div class="stat-card accent"><div class="stat-label">이번달 신규</div><div class="stat-num">${thisMonthPending}</div><div class="stat-sub">면접예정+서류접수</div></div>
    <div class="stat-card"><div class="stat-label">파이프라인</div><div class="stat-num">${inP}</div><div class="stat-sub">진행 중</div></div>
    <div class="stat-card green"><div class="stat-label">재직중</div><div class="stat-num">${emps}</div></div>`;
  if(neg) h+=`<div class="stat-card red"><div class="stat-label">불합격/무응답</div><div class="stat-num">${neg}</div></div>`;
  if(exits) h+=`<div class="stat-card purple"><div class="stat-label">퇴사</div><div class="stat-num">${exits}</div></div>`;
  document.getElementById('stats').innerHTML=h;
}

function renderPipeline(){
  const neg=['불합격','불참','문자남겨놓음','콜백없음'].reduce((a,s)=>a+cnt(s),0);
  let h=PIPELINE.map((s,i)=>{
    const m=SM[s]||FSM,active=flt===s;
    return (i?'<span class="pipe-arrow">›</span>':'')+
      `<div class="pipe${active?' active':''}" onclick="setFilter('${s}')">
        <div class="pipe-dot" style="background:${m.dot}"></div>
        <div><div class="pipe-name">${s}</div><div class="pipe-cnt">${cnt(s)}</div></div>
      </div>`;
  }).join('');
  if(neg) h+=`<span class="pipe-arrow">·</span>
    <div class="pipe${flt==='_neg'?' active':''}" style="border-color:rgba(248,113,113,.25)" onclick="setFilter('_neg')">
      <div class="pipe-dot" style="background:#ef4444"></div>
      <div><div class="pipe-name" style="color:#f87171">불합격/기타</div><div class="pipe-cnt" style="color:#f87171">${neg}</div></div>
    </div>`;
  document.getElementById('pipeline').innerHTML=h;
}

function renderFilters(){
  const base=rows.filter(r=>r['진행상태']!=='최종합격'&&r['진행상태']!=='퇴사');
  let h=`<div class="chip${flt==='all'?' active':''}" onclick="setFilter('all')">전체 ${base.length}</div>`;
  const shown=new Set(base.map(r=>r['진행상태']));
  [...PIPELINE,'불합격','불참','문자남겨놓음','콜백없음'].forEach(s=>{
    if(!shown.has(s)||!cnt(s)) return;
    const m=SM[s]||FSM;
    h+=`<div class="chip${flt===s?' active':''}" onclick="setFilter('${s}')" style="${flt===s?`border-color:${m.dot};color:${m.color};background:${m.bg}`:`color:${m.color}`}">${s} ${cnt(s)}</div>`;
  });
  document.getElementById('filterRow').innerHTML=h;
}

function setFilter(f){flt=f;openIdx=null;renderPipeline();renderFilters();renderCards();}
function toggleCard(i){openIdx=openIdx===i?null:i;renderCards();}

function renderCards(){
  const negS=['불합격','불참','문자남겨놓음','콜백없음'];
  const base=rows.filter(r=>r['진행상태']!=='최종합격'&&r['진행상태']!=='퇴사');
  let visible;
  if(flt==='all') visible=base;
  else if(flt==='_neg') visible=base.filter(r=>negS.includes(r['진행상태']));
  else visible=base.filter(r=>r['진행상태']===flt);
  const grid=document.getElementById('grid'),empty=document.getElementById('emptyEl');
  if(!visible.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  const sorted=[...visible].sort((a,b)=>{const da=a['면접일']||'9999';const db=b['면접일']||'9999';return da<db?-1:da>db?1:0;});
  grid.innerHTML=sorted.map(row=>cardHTML(row,rows.indexOf(row))).join('');
}

function cardHTML(row,i){
  const s=row['진행상태']||'서류접수',m=SM[s]||FSM;
  const name=row['이름']||'이름 없음';
  const birth=row['생년월일'];
  const ageStr=birth?`${new Date().getFullYear()-parseInt(birth.substring(0,4))}세`:'';
  const rawDate=row['면접일']||'';
  const intv=rawDate?rawDate.substring(0,10):'';
  let intvTime='';
  if(rawDate&&rawDate.includes('T')) intvTime=rawDate.substring(11,16);
  const score=row['평가점수'],isOpen=openIdx===i,av=AV[i%AV.length];
  const actions=STAGE_ACTIONS[s]||[];
  const pid=row['id']||'',pidClean=pid.replace(/-/g,'');
  // 날짜 배너 (크게)
  let dateBanner='';
  if(intv){
    const d=new Date(intv+'T12:00:00');
    const days=['일','월','화','수','목','금','토'];
    const today=new Date();today.setHours(0,0,0,0);
    const diff=Math.round((new Date(intv+'T00:00:00')-today)/864e5);
    const dday=diff===0?'D-Day':diff>0?`D-${diff}`:`D+${Math.abs(diff)}`;
    const ddayCls=diff<0?'past':diff===0?'today':'';
    dateBanner=`<div class="card-date-banner">
      <div class="card-date-main">${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})${intvTime?' · '+intvTime:''}</div>
      <span class="card-dday ${ddayCls}">${dday}</span>
    </div>`;
  }
  // 평가란 (메인)
  const evalTxt=row['경력이력서요약']||'';
  const evalBox=`<div class="card-eval-wrap" onclick="event.stopPropagation()">
    <div class="card-eval-label">📝 면접 평가</div>
    <textarea class="card-eval-area" id="eval_${pidClean}" placeholder="면접 내용, 인상, 강점/우려사항 등을 기록하세요..." onblur="saveEval('${pid}',this)" onkeydown="if(event.ctrlKey&&event.key==='Enter'){saveEval('${pid}',this);this.blur()}else if(event.key==='Escape')this.blur()">${esc(evalTxt)}</textarea>
  </div>`;
  // 액션 버튼
  const actionBtns=actions.length?`<div class="action-btns">${actions.map(a=>`<button class="act-btn ${a.cls}" onclick="event.stopPropagation();updateStatus('${pid}','${a.next}',this)">${a.label}</button>`).join('')}</div>`:'';
  // 날짜 수정
  const showTE=['면접예정','면접완료','면접대기'].includes(s);
  const timeRow=showTE?`<div class="time-row" onclick="event.stopPropagation()">
    <span class="info-icon">📅</span>
    <input class="time-input" type="date" value="${intv}" id="di_${pidClean}">
    <input class="time-input" type="time" value="${intvTime}" id="ti_${pidClean}">
    <button class="time-save-btn" onclick="saveDateTime('${pid}',document.getElementById('di_${pidClean}'),document.getElementById('ti_${pidClean}'),this)">저장</button>
  </div>`:'';
  // 추가 정보 (접기)
  const hasExtra=row['학력']||row['강점']||row['우려사항감점요인']||row['면접관']||row['url'];
  return `<div class="card${isOpen?' open':''}" style="--sc:${m.dot}" onclick="toggleCard(${i})">
    <div class="card-inner">
      <div class="card-head">
        <div class="avatar" style="background:${av}">${esc(name.slice(0,1))}</div>
        <div style="flex:1;min-width:0">
          <div class="card-name">${esc(name)}</div>
          <div class="card-sub">${ageStr?ageStr+' · ':''}${esc(row['지원직무']||'-')}${row['연락처']?' · '+esc(row['연락처']):''}</div>
        </div>
        <span class="badge" style="background:${m.bg};color:${m.color}">${esc(s)}</span>
        ${sessionStorage.getItem('img_'+pid)?`<button class="resume-btn" onclick="event.stopPropagation();showResumeImg('${pid}')">🖼 이력서</button>`:''}
      </div>
      ${dateBanner}
      ${evalBox}
      ${timeRow}
      ${actionBtns}
      <div class="card-foot">
        ${score!=null?starsHTML(score):'<span style="color:var(--muted);font-size:11px">점수 없음</span>'}
        ${hasExtra?`<span class="chevron">${isOpen?'▲':'▼'}</span>`:''}
      </div>
    </div>
    ${hasExtra?`<div class="detail">
      <div class="detail-grid">
        ${df('학력',row['학력'])}${df('면접관',row['면접관'])}
        ${df('강점',row['강점'],true)}
        ${df('우려사항',row['우려사항감점요인'],true)}
      </div>
      ${row['url']?`<a class="notion-btn" href="${row['url']}" target="_blank">📋 노션에서 열기</a>`:''}
    </div>`:''}
  </div>`;
}

function renderMonthly(){
  if(!rows.length){document.getElementById('monthlyWrap').style.display='none';return;}
  document.getElementById('monthlyWrap').style.display='block';
  const months=new Set();
  rows.forEach(r=>{
    if(r.createdAt) months.add(r.createdAt.substring(0,7));
    if(r['면접일']) months.add(r['면접일'].substring(0,7));
  });
  months.add(new Date().toISOString().substring(0,7));
  const sorted=[...months].sort();
  const minYM=sorted[0]||'2026-01',maxYM=sorted[sorted.length-1];
  const fromEl=document.getElementById('fromMonth'),toEl=document.getElementById('toMonth');
  if(!fromEl._init){
    fromEl._init=true;
    fromEl.min=minYM;fromEl.max=maxYM;toEl.min=minYM;toEl.max=maxYM;
    const d3=new Date();d3.setMonth(d3.getMonth()-2);
    fromEl.value=d3.toISOString().substring(0,7);
    toEl.value=maxYM;
    fromEl.onchange=toEl.onchange=renderMonthlyTable;
  }
  renderMonthlyTable();
}

function renderMonthlyTable(){
  const fromYM=document.getElementById('fromMonth').value;
  const toYM=document.getElementById('toMonth').value;
  if(!fromYM||!toYM) return;
  const range=[];let cur=fromYM;
  while(cur<=toYM){
    range.push(cur);
    const [y,m]=cur.split('-').map(Number);
    let nm=m+1;let ny=y;if(nm>12){ny++;nm=1;}cur=ny+'-'+String(nm).padStart(2,'0');
  }
  const data={};
  range.forEach(ym=>{data[ym]={total:0,interview:0,noShow:0,noContact:0,pass:0,fail:0};});
  rows.forEach(r=>{
    const created=(r.createdAt||'').substring(0,7);
    const intM=(r['면접일']||'').substring(0,7);
    const s=r['진행상태']||'';
    if(data[created]&&s!=='최종합격'&&s!=='퇴사') data[created].total++;
    if(intM&&data[intM]){
      if(['면접예정','면접완료','합격','최종합격','불참','불합격'].includes(s)) data[intM].interview++;
      if(s==='불참') data[intM].noShow++;
      if(s==='최종합격'||s==='합격') data[intM].pass++;
      if(s==='불합격') data[intM].fail++;
    }
    if(data[created]&&['문자남겨놓음','콜백없음'].includes(s)) data[created].noContact++;
  });
  const maxT=Math.max(...range.map(ym=>data[ym].total),1);
  const tbody=range.slice().reverse().map(ym=>{
    const d=data[ym];
    const [y,m]=ym.split('-');
    const lbl=`${y.slice(2)}년 ${parseInt(m)}월`;
    const bw=Math.round((d.total/maxT)*60);
    return `<tr>
      <td class="m-ym">${lbl}</td>
      <td>${d.total?`<span class="m-val">${d.total}</span><span class="m-mini" style="width:${bw}px;background:#5b7ff5"></span>`:'<span class="m-empty">-</span>'}</td>
      <td>${d.interview?`<span class="m-val">${d.interview}</span>`:'<span class="m-empty">-</span>'}</td>
      <td>${d.noShow?`<span class="m-val" style="color:#f87171">${d.noShow}</span>`:'<span class="m-empty">-</span>'}</td>
      <td>${d.noContact?`<span class="m-val" style="color:#fbbf24">${d.noContact}</span>`:'<span class="m-empty">-</span>'}</td>
      <td>${d.pass?`<span class="m-val" style="color:#4ade80">${d.pass}</span>`:'<span class="m-empty">-</span>'}</td>
      <td>${d.fail?`<span class="m-val" style="color:#f87171">${d.fail}</span>`:'<span class="m-empty">-</span>'}</td>
    </tr>`;
  }).join('');
  document.getElementById('monthlyBody').innerHTML=tbody||'<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:20px">데이터 없음</td></tr>';
}

function df(l,v,w){return `<div class="df${w?' wide':''}">`+`<label>${l}</label><p class="${v?'':'nil'}">${v?esc(v):'—'}</p></div>`;}
function starsHTML(s){const f=Math.round(Math.min(s,10)/10*5);let h='<div class="stars">';for(let i=0;i<5;i++)h+=`<span class="star${i>=f?' off':''}">★</span>`;return h+`<span class="score-tag">${s}점</span></div>`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function tenure(d){return tenureBetween(d,new Date().toISOString());}
function tenureBetween(start,end){
  const s=new Date(start.substring(0,10)),e=new Date(end.substring(0,10));
  let y=e.getFullYear()-s.getFullYear(),m=e.getMonth()-s.getMonth();
  if(e.getDate()<s.getDate()) m--;
  if(m<0){y--;m+=12;}
  return y>0?`${y}년 ${m}개월`:m>0?`${m}개월`:'1개월 미만';
}

async function saveDateTime(pageId,dateEl,timeEl,saveBtn){
  const dateVal=dateEl.value,timeVal=timeEl.value;
  if(!pageId||!dateVal){toast('날짜를 선택해주세요','err');return;}
  [dateEl,timeEl,saveBtn].forEach(el=>el&&(el.disabled=true));
  try{
    const dt=timeVal?dateVal+'T'+timeVal+':00.000+09:00':dateVal;
    const r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pageId,field:'면접일',value:dt})});
    const d=await r.json();
    if(!r.ok||d.error) throw new Error(d.error||'Error');
    toast(timeVal?`📅 ${dateVal} ⏰ ${timeVal} 저장됨`:`📅 ${dateVal} 저장됨`);
    const rec=rows.find(r=>r.id===pageId);
    if(rec) rec['면접일']=dt;
    renderCards();
  }catch(e){
    toast('저장 실패: '+e.message,'err');
  }
  [dateEl,timeEl,saveBtn].forEach(el=>el&&(el.disabled=false));
}

async function resignEmployee(pid,name,btn){
  const today=new Date().toISOString().substring(0,10);
  const dateStr=prompt(name+' 퇴사 처리\n퇴사일 입력 (YYYY-MM-DD)',today);
  if(dateStr===null) return;
  btn.disabled=true;btn.textContent='⏳ 처리중...';
  try{
    const r1=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pageId:pid,status:'퇴사'})});
    const d1=await r1.json();
    if(!r1.ok||d1.error) throw new Error(d1.error||'상태 업데이트 실패');
    if(dateStr){
      await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({pageId:pid,field:'면접일',value:dateStr})});
    }
    toast('🚪 퇴사 처리 완료');
    empOpenIdx=null;
    await loadData();
  }catch(e){
    toast('퇴사 처리 실패: '+e.message,'err');
    btn.disabled=false;btn.textContent='🚪 퇴사 처리';
  }
}

async function saveEval(pageId,el){
  if(!pageId) return;
  const text=el.value;
  if(el.dataset.last===text) return;
  el.dataset.last=text;
  el.classList.add('saving');
  try{
    const r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pageId,field:'경력이력서요약',value:text})});
    const d=await r.json();
    if(!r.ok||d.error) throw new Error(d.error||'Error');
    toast('✓ 평가 저장됨');
    const rec=rows.find(r=>r.id===pageId);
    if(rec) rec['경력이력서요약']=text;
    el.classList.remove('saving');el.classList.add('saved');
    setTimeout(()=>el.classList.remove('saved'),1500);
  }catch(e){
    toast('저장 실패: '+e.message,'err');
    el.classList.remove('saving');
  }
}

let _imgBase64=null;
function handleImgUpload(e){
  const file=e.target.files[0];if(!file)return;
  // 이미지 리사이즈 후 base64
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=900;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){const s=Math.min(MAX/w,MAX/h);w=Math.round(w*s);h=Math.round(h*s);}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const b64=canvas.toDataURL('image/jpeg',0.85).split(',')[1];
      _imgBase64=b64;
      document.getElementById('imgThumb').src='data:image/jpeg;base64,'+b64;
      document.getElementById('imgPreviewWrap').style.display='block';
      document.getElementById('imgPlaceholder').style.display='none';
      document.getElementById('imgZone').classList.add('has-img');
      analyzeImg(b64);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
function clearImg(e){
  e.stopPropagation();
  _imgBase64=null;
  document.getElementById('mf-img').value='';
  document.getElementById('imgPreviewWrap').style.display='none';
  document.getElementById('imgPlaceholder').style.display='flex';
  document.getElementById('imgZone').classList.remove('has-img');
}
async function analyzeImg(b64){
  const bar=document.getElementById('imgAnalyzeBar');
  bar.style.display='flex';
  try{
    const r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'parse-image',imageBase64:b64})});
    const d=await r.json();
    if(d.parsed){
      const p=d.parsed;
      if(p.name)document.getElementById('mf-name').value=p.name;
      if(p.phone)document.getElementById('mf-phone').value=p.phone;
      if(p.gender&&['남','여'].includes(p.gender))document.getElementById('mf-gender').value=p.gender;
      if(p.birth)document.getElementById('mf-birth').value=p.birth;
      if(p.position)document.getElementById('mf-pos').value=p.position;
      if(p.memo)document.getElementById('mf-memo').value=p.memo;
      toast('✓ 이미지에서 정보를 자동입력했습니다');
    }
  }catch(err){toast('이미지 분석 실패','err');}
  finally{bar.style.display='none';}
}

async function submitAddApplicant(){
  const name=(document.getElementById('mf-name').value||'').trim();
  if(!name){toast('이름은 필수입니다','err');return;}
  const btn=document.getElementById('addSubmitBtn');
  btn.disabled=true;btn.textContent='추가 중...';
  const payload={action:'create',name,
    phone:(document.getElementById('mf-phone').value||'').trim(),
    gender:(document.getElementById('mf-gender').value||'').trim(),
    birth:(document.getElementById('mf-birth').value||'').trim(),
    position:(document.getElementById('mf-pos').value||'').trim(),
    memo:(document.getElementById('mf-memo').value||'').trim(),
  };
  try{
    const r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const d=await r.json();
    if(!r.ok||d.error)throw new Error(d.error||'오류 발생');
    toast('✓ '+name+' 지원자가 추가됐습니다');
    if(_imgBase64 && d.id) sessionStorage.setItem('img_'+d.id.replace(/-/g,''), 'data:image/jpeg;base64,'+_imgBase64);
    closeAddModal();
    await loadData();
  }catch(e){
    toast('추가 실패: '+e.message,'err');
    btn.disabled=false;btn.textContent='✓ 추가하기';
  }
}
